# ===========================================================================
# docker-compose.backend.yml — Backend EC2 instances only
#
# Used by the Backend Launch Template user data.
# Runs Node.js/Express API connected to Amazon RDS.
#
# Key design decisions:
#   - NO postgres service — uses Amazon RDS (DATABASE_URL from Secrets Manager)
#   - NO frontend service — frontend runs on separate EC2 instances
#   - NO hardcoded secrets — application reads from AWS Secrets Manager on startup
#   - env_file points to .env.aws (written by user data, contains non-secret config)
#   - The IAM instance profile grants Secrets Manager + S3 + KMS access
# ===========================================================================

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: caresync-backend
    env_file:
      # Written by Launch Template user data using printf (no leading whitespace)
      - .env.aws
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    restart: unless-stopped
    # ---------------------------------------------------------------------------
    # Log shipping: Docker awslogs driver → CloudWatch Log Group
    #
    # AWS_REGION and CLOUDWATCH_LOG_GROUP_APP are NOT hardcoded here.
    # They are injected at runtime from the .env.aws file which is written
    # by the EC2 Launch Template user data using Terraform-interpolated values.
    # The launch template runs: docker compose --env-file .env.aws ...
    # which makes these variables available for Docker Compose YAML substitution.
    #
    # awslogs-create-group=false  → Terraform owns the log group lifecycle.
    # awslogs-stream              → each container gets its own named stream.
    # ---------------------------------------------------------------------------
    logging:
      driver: awslogs
      options:
        awslogs-region: "${AWS_REGION}"
        awslogs-group: "${CLOUDWATCH_LOG_GROUP_APP}"
        awslogs-stream: "${EC2_INSTANCE_ID}-backend-app"
        awslogs-create-group: "false"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      # Give the app time to start: Docker build + Secrets Manager fetch + Prisma connect
      start_period: 120s

