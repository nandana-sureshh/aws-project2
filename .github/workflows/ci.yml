name: CareSync CI/CD Pipeline

on:
  push:
    branches:
      - microservices-migration
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'helm/**'
      - '.github/workflows/**'

env:
  AWS_REGION: us-east-1

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: auth-service
            context: backend/services/auth-service
          - name: user-service
            context: backend/services/user-service
          - name: appointment-service
            context: backend/services/appointment-service
          - name: document-service
            context: backend/services/document-service
          - name: notification-service
            context: backend/services/notification-service
          - name: ai-service
            context: backend/services/ai-service
          - name: frontend
            context: frontend
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: caresync/${{ matrix.service.name }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f ${{ matrix.service.context }}/Dockerfile ${{ matrix.service.context }}
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest -f ${{ matrix.service.context }}/Dockerfile ${{ matrix.service.context }}
          
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  update-helm-values:
    name: Update Helm Values
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Update Image Tags in Helm Chart
        run: |
          sed -i "s/tag: .*/tag: ${{ github.sha }}/g" helm/values-dev.yaml
          
      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add helm/values-dev.yaml
          git commit -m "chore: update helm image tags to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push
