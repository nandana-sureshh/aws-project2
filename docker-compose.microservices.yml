version: '3.9'

services:

  # ─────────────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: caresync-ms-postgres
    environment:
      POSTGRES_DB: caresync_db
      POSTGRES_USER: caresync_user
      POSTGRES_PASSWORD: caresync_pass
    volumes:
      - ms_postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caresync_user -d caresync_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - caresync-ms-net

  # ─────────────────────────────────────────────────────
  # Auth Service (runs migrations on startup)
  # ─────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./backend
      dockerfile: services/auth-service/Dockerfile
    container_name: caresync-auth
    environment:
      NODE_ENV: development
      PORT: "3001"
      DATABASE_URL: postgresql://caresync_user:caresync_pass@postgres:5432/caresync_db
      JWT_SECRET: caresync-jwt-secret-local-dev-32chars!!
      JWT_REFRESH_SECRET: caresync-refresh-secret-local-32chars!!
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: "*"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - caresync-ms-net

  # ─────────────────────────────────────────────────────
  # User Service
  # ─────────────────────────────────────────────────────
  user-service:
    build:
      context: ./backend
      dockerfile: services/user-service/Dockerfile
    container_name: caresync-user
    environment:
      NODE_ENV: development
      PORT: "3002"
      DATABASE_URL: postgresql://caresync_user:caresync_pass@postgres:5432/caresync_db
      JWT_SECRET: caresync-jwt-secret-local-dev-32chars!!
      JWT_REFRESH_SECRET: caresync-refresh-secret-local-32chars!!
      CORS_ORIGIN: "*"
    depends_on:
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - caresync-ms-net

  # ─────────────────────────────────────────────────────
  # Appointment Service
  # ─────────────────────────────────────────────────────
  appointment-service:
    build:
      context: ./backend
      dockerfile: services/appointment-service/Dockerfile
    container_name: caresync-appointment
    environment:
      NODE_ENV: development
      PORT: "3003"
      DATABASE_URL: postgresql://caresync_user:caresync_pass@postgres:5432/caresync_db
      JWT_SECRET: caresync-jwt-secret-local-dev-32chars!!
      JWT_REFRESH_SECRET: caresync-refresh-secret-local-32chars!!
      CORS_ORIGIN: "*"
    depends_on:
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - caresync-ms-net

  # ─────────────────────────────────────────────────────
  # Document Service
  # ─────────────────────────────────────────────────────
  document-service:
    build:
      context: ./backend
      dockerfile: services/document-service/Dockerfile
    container_name: caresync-document
    environment:
      NODE_ENV: development
      PORT: "3004"
      DATABASE_URL: postgresql://caresync_user:caresync_pass@postgres:5432/caresync_db
      JWT_SECRET: caresync-jwt-secret-local-dev-32chars!!
      JWT_REFRESH_SECRET: caresync-refresh-secret-local-32chars!!
      CORS_ORIGIN: "*"
      STORAGE_PROVIDER: local
      UPLOADS_DIR: /app/uploads
      MAX_FILE_SIZE_MB: "10"
    volumes:
      - ms_uploads_data:/app/uploads
    depends_on:
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - caresync-ms-net

  # ─────────────────────────────────────────────────────
  # Notification Service
  # ─────────────────────────────────────────────────────
  notification-service:
    build:
      context: ./backend
      dockerfile: services/notification-service/Dockerfile
    container_name: caresync-notification
    environment:
      NODE_ENV: development
      PORT: "3005"
      DATABASE_URL: postgresql://caresync_user:caresync_pass@postgres:5432/caresync_db
      JWT_SECRET: caresync-jwt-secret-local-dev-32chars!!
      JWT_REFRESH_SECRET: caresync-refresh-secret-local-32chars!!
      CORS_ORIGIN: "*"
    depends_on:
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - caresync-ms-net

  # ─────────────────────────────────────────────────────
  # API Gateway (Nginx — mimics EKS Ingress)
  # ─────────────────────────────────────────────────────
  api-gateway:
    image: nginx:1.27-alpine
    container_name: caresync-api-gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx.gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service
      - user-service
      - appointment-service
      - document-service
      - notification-service
    networks:
      - caresync-ms-net

  # ─────────────────────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: caresync-ms-frontend
    networks:
      - caresync-ms-net

volumes:
  ms_postgres_data:
  ms_uploads_data:

networks:
  caresync-ms-net:
    driver: bridge
