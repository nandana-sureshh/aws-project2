apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: user-service-route
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
  - name: caresync-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/patients
    - path:
        type: PathPrefix
        value: /api/doctors
    - path:
        type: PathPrefix
        value: /api/admin
    backendRefs:
    - name: user-service
      port: 80
