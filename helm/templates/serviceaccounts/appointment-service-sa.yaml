apiVersion: v1
kind: ServiceAccount
metadata:
  name: appointment-service-sa
  namespace: {{ .Values.namespace }}
  labels:
    app: appointment-service
    {{- include "caresync.labels" . | nindent 4 }}
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::${AWS_ACCOUNT_ID}:role/caresync-dev-appointment-service-role"
automountServiceAccountToken: true
