# ALB Ingress is intentionally NOT defined here.
#
# The ALB Ingress is dynamically generated in scripts/02-deploy-k8s.sh
# AFTER the KGateway proxy service has been provisioned by the control plane.
# This prevents hardcoding KGateway's internal proxy Service name and port,
# which can vary across KGateway versions.
#
# The deployment script uses label selectors (gloo=kube-gateway) to discover
# the exact Service name and port at runtime before generating and applying
# the Ingress manifest.
