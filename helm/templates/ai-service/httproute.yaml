apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ai-service-route
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
  - name: caresync-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/ai
    backendRefs:
    - name: ai-service
      port: 80
