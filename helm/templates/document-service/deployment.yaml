apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-service
  namespace: {{ .Values.namespace }}
  labels:
    app: document-service
    {{- include "caresync.labels" . | nindent 4 }}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: document-service
  template:
    metadata:
      labels:
        app: document-service
        {{- include "caresync.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: document-service-sa
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              DB_HOST=$(echo $DATABASE_URL | sed -e 's|^.*@||' -e 's|:.*$||' -e 's|/.*$||')
              echo "[init] Waiting for database at $DB_HOST:5432..."
              until nc -z "$DB_HOST" 5432; do
                echo "[init] DB not ready — retrying in 3s"
                sleep 3
              done
              echo "[init] Database is reachable"
          volumeMounts:
        - name: uploads-scratch
          mountPath: /uploads
        envFrom:
            - secretRef:
                name: {{ .Values.secrets.name }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: document-service
      volumes:
      - name: uploads-scratch
        emptyDir: {}
      containers:
      - name: document-service
        image: "{{ .Values.services.documentService.repository }}:{{ .Values.services.documentService.tag }}"
        imagePullPolicy: Always
        ports:
        - containerPort: {{ .Values.services.documentService.port }}
        envFrom:
        - secretRef:
            name: {{ .Values.secrets.name }}
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /api/health
            port: {{ .Values.services.documentService.port }}
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /api/health
            port: {{ .Values.services.documentService.port }}
          initialDelaySeconds: 5
          periodSeconds: 10
