# ===========================================================================
# docker-compose.frontend.yml — Frontend EC2 instances only
#
# Used by the Frontend Launch Template user data.
# Runs Nginx + React SPA.
#
# Key design decisions:
#   - NO depends_on backend — frontend and backend are on separate EC2 instances
#   - VITE_API_URL build arg is empty ("") so the React app uses relative /api/*
#     paths. The External ALB listener rule routes /api/* to the backend TG.
#   - No postgres service (not needed on frontend instances)
# ===========================================================================

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Empty string = relative paths (/api/*) in the React SPA.
        # External ALB routes /api/* to backend target group.
        VITE_API_URL: ""
    container_name: caresync-frontend
    ports:
      - "80:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
