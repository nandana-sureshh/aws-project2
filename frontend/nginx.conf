server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ---------------------------------------------------------------------------
    # Compression
    # ---------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # ---------------------------------------------------------------------------
    # React SPA — serve index.html for all non-file routes (client-side routing)
    # ---------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------------------------------------------------------------------------
    # Static asset caching
    # Vite builds JS/CSS with content-hash filenames so 1-year cache is safe.
    # ---------------------------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ---------------------------------------------------------------------------
    # NOTE: No proxy_pass to "backend" here.
    #
    # In the AWS deployment, the browser sends API requests directly to the
    # External ALB (same origin, relative paths /api/*).  The ALB listener rule
    #   path-pattern /api/*  ->  Backend Target Group
    # handles routing to backend EC2 instances.
    #
    # This Nginx instance only serves static React files.
    # Adding a proxy_pass http://backend:3000 block would:
    #   1. Fail immediately — there is no "backend" container on this host.
    #   2. Be completely unnecessary — the ALB already handles /api/* routing.
    # ---------------------------------------------------------------------------
}
