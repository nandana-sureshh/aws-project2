version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: caresync-postgres
    environment:
      POSTGRES_DB: caresync_db
      POSTGRES_USER: caresync_user
      POSTGRES_PASSWORD: caresync_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caresync_user -d caresync_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - caresync-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: caresync-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://caresync_user:caresync_pass@postgres:5432/caresync_db
      JWT_SECRET: caresync-jwt-secret-change-in-production-32chars
      JWT_REFRESH_SECRET: caresync-refresh-secret-change-production-32c
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:80
      UPLOADS_DIR: /app/uploads
      MAX_FILE_SIZE_MB: 10
      STORAGE_PROVIDER: local
      NOTIFICATION_PROVIDER: database
      EVENT_PROVIDER: console
      QUEUE_PROVIDER: local
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 200
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - caresync-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
    container_name: caresync-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - caresync-net

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  caresync-net:
    driver: bridge
